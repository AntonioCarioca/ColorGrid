<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Metadados e recursos da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorGrid</title>
    <!-- Folha de estilos principal -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Ícone exibido na aba do navegador -->
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>

<body>
    <!-- Cabeçalho com título e link para o repositório -->
    <header>
        <strong class="title">ColorGrid</strong>
        <a href="https://github.com/AntonioCarioca/ColorGrid" target="_blank">
            <img src="images/github.svg" alt="">
        </a>
    </header>
    <!-- Botões de geração e formato das cores -->
    <div class="controls">
        <button onclick="gerarGrids()">Gerar Cores</button>
        <button onclick="exportarPaletaPNG()">Exportar PNG</button>
        <button class="formato-btn" data-formato="hex" onclick="setFormato('hex')">HEX</button>
        <button class="formato-btn" data-formato="rgb" onclick="setFormato('rgb')">RGB</button>
        <button class="formato-btn" data-formato="rgba" onclick="setFormato('rgba')">RGBA</button>
    </div>
    <!-- Área onde os cards de cores são renderizados -->
    <div class="grid" id="grid"></div>
    <!-- Script principal da aplicação -->
    <script src="js/script.js" type="text/javascript" charset="utf-8" async defer></script>
</body>

</html>
